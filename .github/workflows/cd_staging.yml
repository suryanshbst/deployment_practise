name: Deploy to Development Cluster

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate SSH_PRIVATE_KEY secret
        run: |
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "ERROR: SSH_PRIVATE_KEY secret is not set. Add it in Repository settings → Secrets and variables → Actions." >&2
            exit 1
          fi

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add EC2 host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ec2-35-154-211-178.ap-south-1.compute.amazonaws.com >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=yes ubuntu@ec2-35-154-211-178.ap-south-1.compute.amazonaws.com << 'EOF'

            # Ensure Node.js and basic build tools are available for turbo/next
            sudo apt-get update -y
            sudo apt-get install -y curl ca-certificates gnupg build-essential
            curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
            sudo apt-get install -y nodejs

            cd ~/deployment_practise

            git fetch origin
            git reset --hard origin/main

            export PATH="$HOME/.bun/bin:$PATH"

            bun install

            cd packages/db
            bunx prisma generate
            bunx prisma migrate deploy
            cd ../..

            bun run build

            pm2 restart next-frontend || pm2 start "bun run start" --name "next-frontend" --cwd "/home/ubuntu/deployment_practise/apps/web"
            pm2 restart http-server || pm2 start "bun index.ts" --name "http-server" --cwd "/home/ubuntu/deployment_practise/apps/http-server"
            pm2 restart ws-server || pm2 start "bun index.ts" --name "ws-server" --cwd "/home/ubuntu/deployment_practise/apps/ws-server"

            pm2 save
          EOF
